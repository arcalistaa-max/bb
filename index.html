<!DOCTYPE html>
<html>
<head>
<title>Run To You 💖</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: linear-gradient(#ffe4ec, #ffd1dc);
  font-family: Arial;
  text-align: center;
}

h2 { color:#ff4d6d; }
#score { color:#ff4d6d; }

/* GAME */
#game {
  width: 90%;
  height: 300px;
  margin: 30px auto;
  position: relative;
  overflow: hidden;
  border-radius: 20px;
  background: rgba(255,255,255,0.4);
}

/* GROUND */
#ground {
  position: absolute;
  bottom: 0;
  width: 200%;
  height: 6px;
  background: #ff8fab;
  animation: ground 2s linear infinite;
}

@keyframes ground {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

/* CHARACTER */
#boy {
  position: absolute;
  bottom: 6px;
  left: 50px;
  width: 60px;
  transition: 0.2s;
}

.jump {
  animation: jump 0.45s ease;
}

@keyframes jump {
  0% { bottom: 6px; }
  50% { bottom: 110px; }
  100% { bottom: 6px; }
}

.slide {
  height: 35px;
}

/* OBJECT */
.obstacle, .block, .loveItem {
  position: absolute;
  right: -50px;
  font-size: 24px;
}

.obstacle { bottom: 6px; }
.block {
  bottom: 80px;
  width: 40px;
  height: 40px;
  background: #ff8fab;
  border-radius: 8px;
}
.loveItem { bottom: 140px; }

/* UI */
#popup {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  background: white;
  padding: 20px;
  border-radius: 15px;
  color: #ff4d6d;
  transition: 0.3s;
}

#popup.show {
  transform: translate(-50%, -50%) scale(1);
}

/* START SCREEN */
#startScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(255,228,236,0.95);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: #ff4d6d;
  z-index: 999;
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: #ff4d6d;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

</style>
</head>

<body>

<h2>Run To You 💖</h2>
<h3 id="score">Score: 0</h3>

<!-- START SCREEN -->
<div id="startScreen">
  <h2>Run To You 💖</h2>
  <p>
    ⬆️ Lompat: Spasi / Klik<br>
    ⬇️ Nunduk: Arrow Down / S<br><br>
    💔 Hindari rintangan<br>
    💖 Ambil love (+10)
  </p>
  <button onclick="startGame()">Mulai 💖</button>
</div>

<div id="game">
  <div id="ground"></div>
  <img id="boy" src="zeeyz.png">
  <div id="popup"></div>
</div>

<script>
  
let gameStarted = false;

let boy = document.getElementById("boy");
let popup = document.getElementById("popup");
let scoreDisplay = document.getElementById("score");

let score = 0;
let gameOver = false;
let isSliding = false;
let obstacles = [];
  
  
/* START */
function startGame(){
  document.getElementById("startScreen").style.display = "none";
  gameStarted = true;
  spawnObstacle();
}


/* CONTROL */
function jump(){
  if(gameOver || isSliding) return;

  boy.classList.remove("jump");
  void boy.offsetWidth;
  boy.classList.add("jump");
}

function slide(){
  if(gameOver) return;

  isSliding = true;
  boy.classList.add("slide");

  setTimeout(()=>{
    isSliding = false;
    boy.classList.remove("slide");
  },400);
}

window.addEventListener("keydown", e=>{
  if(e.code === "Space"){
    e.preventDefault();
    jump();
  }
  if(e.code === "ArrowDown" || e.key === "s"){
    slide();
  }
});

window.addEventListener("click", jump);
window.addEventListener("touchstart", jump);

/* SCORE */
setInterval(()=>{
  if(gameOver) return;
  score++;
  scoreDisplay.innerText = "Score: " + score;
},300);

/* SPAWN */
function spawnObstacle(){
  if(gameOver || !gameStarted) return;

  let type = Math.random();
  let el = document.createElement("div");

  if(type < 0.5){
    el.className = "obstacle";
    el.innerHTML = "💔";
  } 
  else if(type < 0.65){
    el.className = "block";
  } 
  else {
    el.className = "loveItem";
    el.innerHTML = "💖";
    el.style.bottom = (Math.random()*60+120)+"px";
  }

  el.style.right = "-50px";
  document.getElementById("game").appendChild(el);
  obstacles.push(el);

  let delay = Math.random()*500 + 600;
  setTimeout(spawnObstacle, delay);
}

/* MOVEMENT + COLLISION */
let speed = 8;

setInterval(()=>{
  if(gameOver) return;

  for(let i = obstacles.length - 1; i >= 0; i--){
    let el = obstacles[i];

    let current = parseInt(el.style.right);
    el.style.right = (current + speed) + "px";

    let boyRect = boy.getBoundingClientRect();
    let rect = el.getBoundingClientRect();

    let padX = 25;
    let padY = 10;

    // OBSTACLE (bawah)
    if(el.className === "obstacle"){
      if(
        boyRect.right - padX > rect.left &&
        boyRect.left + padX < rect.right &&
        boyRect.bottom - padY > rect.top
      ){
        endGame();
      }
    }

    // BLOCK (atas)
    if(el.className === "block"){
      if(
        !isSliding &&
        boyRect.right - padX > rect.left &&
        boyRect.left + padX < rect.right &&
        boyRect.top + padY < rect.bottom
      ){
        endGame();
      }
    }

    // LOVE
    if(el.className === "loveItem"){
      if(
        boyRect.right > rect.left &&
        boyRect.left < rect.right &&
        boyRect.top < rect.bottom
      ){
        score += 10;
        scoreDisplay.innerText = "Score: " + score;
        el.remove();
        obstacles.splice(i,1);
        continue;
      }
    }

    // HAPUS kalau keluar layar
    if(rect.right < 0){
      el.remove();
      obstacles.splice(i,1);
    }
  }

},20);

/* GAME OVER */
function endGame(){
  gameOver = true;
  popup.innerHTML = "Yah sayang aku nabrak 😭<br>Score: "+score;
  popup.classList.add("show");

  setTimeout(()=>location.reload(),2000);
}

</script>

</body>
</html>
