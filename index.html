<!DOCTYPE html>
<html>
<head>
  <title>Run To You 💖</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: linear-gradient(#ffe4ec, #ffd1dc);
      font-family: Arial;
      text-align: center;
    }

    h2 { margin-top: 20px; color: #ff4d6d; }
    #score { color: #ff4d6d; }

    #game {
      width: 90%;
      height: 300px;
      margin: 30px auto;
      border-radius: 20px;
      background: rgba(255,255,255,0.4);
      position: relative;
      overflow: hidden;
      transition: 1s;
    }

    /* GROUND */
    #ground {
      position: absolute;
      bottom: 0;
      width: 200%;
      height: 6px;
      background: #ff8fab;
      animation: ground 2s linear infinite;
    }

    @keyframes ground {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    /* CHARACTER */
    #boy, #girl {
      position: absolute;
      bottom: 6px;
      width: 60px;
      transition: 1s;
    }

    #boy { left: 50px; }
    #girl { right: 80px; display: none; }

    /* OBSTACLE */
    #obstacle {
      position: absolute;
      bottom: 6px;
      right: -50px;
      font-size: 25px;
      animation: move 2s linear infinite;
    }

    @keyframes move {
      from { right: -50px; }
      to { right: 100%; }
    }

    /* JUMP */
    .jump {
      animation: jump 0.6s ease;
    }

    @keyframes jump {
      0% { bottom: 6px; }
      50% { bottom: 100px; }
      100% { bottom: 6px; }
    }

    /* POPUP */
    #popup {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: white;
      padding: 20px;
      border-radius: 15px;
      color: #ff4d6d;
      transition: 0.3s;
    }

    #popup.show {
      transform: translate(-50%, -50%) scale(1);
    }

    /* LOVE */
    .love {
      position: absolute;
      font-size: 20px;
      animation: love 1s forwards;
    }

    @keyframes love {
      from { opacity:1; transform: scale(0.5); }
      to { opacity:0; transform: scale(2) translateY(-80px); }
    }

    #end {
      display: none;
      font-size: 22px;
      color: #ff4d6d;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h2>Run To You 💖</h2>
<h3 id="score">Score: 0</h3>

<div id="game">
  <div id="ground"></div>

  <img id="boy" src="zeeyz.png">
  <img id="girl" src="drell.png">

  <div id="obstacle">💔</div>
  <div id="popup"></div>
</div>

<div id="end">Akhirnya kita ketemu 🥺💖</div>

<audio id="jumpSound" src="jump.mp3"></audio>

<script>
let boy = document.getElementById("boy");
let girl = document.getElementById("girl");
let obstacle = document.getElementById("obstacle");
let popup = document.getElementById("popup");
let scoreDisplay = document.getElementById("score");
let end = document.getElementById("end");

let score = 0;
let speed = 2;
let gameOver = false;

/* JUMP FUNCTION */
function jump(){
  if(gameOver) return;

  boy.classList.remove("jump");
  void boy.offsetWidth;
  boy.classList.add("jump");

  document.getElementById("jumpSound").play();
}

/* CONTROL */
window.addEventListener("keydown", e=>{
  if(e.code === "Space"){
    e.preventDefault();
    jump();
  }
});

window.addEventListener("click", jump);
window.addEventListener("touchstart", jump);

/* SCORE */
setInterval(()=>{
  if(gameOver) return;
  score++;
  scoreDisplay.innerText = "Score: " + score;
},250);

/* SPEED */
setInterval(()=>{
  if(gameOver) return;
  speed -= 0.05;
  if(speed < 1.2) speed = 1.2;
  obstacle.style.animationDuration = speed + "s";
},3000);

setInterval(()=>{
  if(gameOver) return;

  let boyRect = boy.getBoundingClientRect();
  let obsRect = obstacle.getBoundingClientRect();
  
  let padding = 15;

  if(
    boyRect.right - padding > obsRect.left &&
    boyRect.left + padding < obsRect.right &&
    boyRect.bottom - padding > obsRect.top
  ){
    gameOver = true;

    popup.innerHTML = "Yah nabrak 😭<br>Score: " + score;
    popup.classList.add("show");

    setTimeout(()=>location.reload(),2000);
  }

},10);

/* ENDING */
setTimeout(()=>{
  gameOver = true;

  obstacle.style.display = "none";
  girl.style.display = "block";

  boy.style.left = "60%";

  setTimeout(()=>{
    boy.src = "couple.png";
    boy.style.left = "65%";

    explodeLove();

    document.getElementById("game").style.transform = "scale(1.2)";
    end.style.display = "block";

  },1500);

},15000);

/* LOVE EFFECT */
function explodeLove(){
  let rect = boy.getBoundingClientRect();

  for(let i=0;i<15;i++){
    let love = document.createElement("div");
    love.className = "love";
    love.innerHTML = "💖";

    love.style.left = (rect.left + Math.random()*50) + "px";
    love.style.top = rect.top + "px";

    document.body.appendChild(love);

    setTimeout(()=>love.remove(),1000);
  }
}
</script>

</body>
</html>
