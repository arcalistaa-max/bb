<!DOCTYPE html>
<html>
<head>
<title>Run To You 💖 (Enhanced)</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: linear-gradient(#ffdde1, #ee9ca7);
  font-family: Arial;
  text-align: center;
}

h2, #score { color:#ff4d6d; }

#game {
  width: 90%;
  height: 320px;
  margin: 30px auto;
  position: relative;
  overflow: hidden;
  border-radius: 20px;
  background: url('https://i.imgur.com/8wKQZ5H.png');
  background-size: cover;
}

#ground {
  position: absolute;
  bottom: 0;
  width: 200%;
  height: 6px;
  background: #ff8fab;
  animation: ground 2s linear infinite;
}

@keyframes ground {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

#boy {
  position: absolute;
  bottom: 6px;
  left: 50px;
  width: 60px;
}

#girl {
  position: absolute;
  bottom: 6px;
  right: 50px;
  width: 90px;
  display: none;
}

.jump { animation: jump 0.45s ease; }
@keyframes jump {
  0% { bottom: 6px; }
  50% { bottom: 120px; }
  100% { bottom: 6px; }
}

.slide { height: 35px; }

.obstacle, .loveItem {
  position: absolute;
  right: -50px;
  font-size: 26px;
}

.obstacle { bottom: 6px; }
.loveItem { bottom: 140px; }

#popup {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  background: white;
  padding: 20px;
  border-radius: 15px;
  color: #ff4d6d;
  transition: 0.3s;
}

#popup.show { transform: translate(-50%, -50%) scale(1); }

button {
  margin-top: 10px;
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>Run To You 💖</h2>
<h3 id="score">Score: 0</h3>

<div id="game">
  <div id="ground"></div>
  <img id="boy" src="zeeyz.png">
  <img id="girl" src="drell.png">
  <div id="popup"></div>
</div>

<!-- SOUND -->
<audio id="jumpSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>
<audio id="hitSound" src="https://www.soundjay.com/button/beep-10.mp3"></audio>
<audio id="winSound" src="https://www.soundjay.com/human/sounds/applause-8.mp3"></audio>
<audio id="loseSound" src="https://www.soundjay.com/misc/sounds/fail-buzzer-02.mp3"></audio>
<audio id="bgm" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>

<script>
let boy = document.getElementById("boy");
let girl = document.getElementById("girl");
let popup = document.getElementById("popup");
let scoreDisplay = document.getElementById("score");

let jumpSound = document.getElementById("jumpSound");
let hitSound = document.getElementById("hitSound");
let winSound = document.getElementById("winSound");
let loseSound = document.getElementById("loseSound");
let bgm = document.getElementById("bgm");

let score = 0;
let gameOver = false;
let obstacles = [];

bgm.volume = 0.3;
bgm.play();

function jump(){
  if(gameOver) return;
  jumpSound.play();
  boy.classList.remove("jump");
  void boy.offsetWidth;
  boy.classList.add("jump");
}

document.addEventListener("click", jump);
document.addEventListener("keydown", e => {
  if(e.code === "Space") jump();
});

setInterval(()=>{
  if(gameOver) return;
  score++;
  scoreDisplay.innerText = "Score: " + score;

  if(score >= 150) winGame();
},100);

function spawnObstacle(){
  if(gameOver) return;

  let el = document.createElement("div");
  let type = Math.random();

  if(type < 0.7){
    el.className = "obstacle";
    el.innerHTML = "💔";
  } else {
    el.className = "loveItem";
    el.innerHTML = "💖";
  }

  el.style.right = "-50px";
  document.getElementById("game").appendChild(el);
  obstacles.push(el);

  setTimeout(spawnObstacle, Math.random()*800+500);
}
spawnObstacle();

let speed = 6;
setInterval(()=>{
  if(gameOver) return;

  for(let i=obstacles.length-1;i>=0;i--){
    let el = obstacles[i];
    el.style.right = (parseInt(el.style.right)+speed)+"px";

    let boyRect = boy.getBoundingClientRect();
    let rect = el.getBoundingClientRect();

    if(el.className === "obstacle"){
      if(boyRect.right > rect.left && boyRect.left < rect.right && boyRect.bottom > rect.top){
        hitSound.play();
        endGame();
      }
    }

    if(el.className === "loveItem"){
      if(boyRect.right > rect.left && boyRect.left < rect.right){
        score += 10;
        el.remove();
        obstacles.splice(i,1);
      }
    }

    if(rect.right < 0){
      el.remove();
      obstacles.splice(i,1);
    }
  }
},20);

function winGame(){
  gameOver = true;
  winSound.play();
  girl.style.display = "block";

  popup.innerHTML = "💖 Kamu berhasil ketemu dia! 💖";
  popup.classList.add("show");
}

function endGame(){
  gameOver = true;
  loseSound.play();

  popup.innerHTML = "😭 Kamu kalah!<br>Score: "+score;
  popup.classList.add("show");
}
</script>

</body>
</html>
