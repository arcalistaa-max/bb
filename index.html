<!DOCTYPE html>
<html>
<head>
  <title>Run To You 💖</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: linear-gradient(#ffe4ec, #ffd1dc);
      font-family: Arial;
      text-align: center;
    }

    h2 { margin-top: 20px; color: #ff4d6d; }
    #score { color: #ff4d6d; font-weight: bold; }

    #game {
      width: 90%;
      height: 300px;
      margin: 40px auto;
      border-radius: 20px;
      background: rgba(255,255,255,0.4);
      backdrop-filter: blur(8px);
      overflow: hidden;
      position: relative;
      transition: transform 1.5s ease;
    }

    #ground {
      position: absolute;
      bottom: 0;
      width: 200%;
      height: 6px;
      background: #ff8fab;
      animation: groundMove 2s linear infinite;
    }

    @keyframes groundMove {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    #boy, #girl {
      position: absolute;
      bottom: 6px;
      width: 50px; /* sama persis */
      transition: all 1s ease;
    }

    #boy { left: 50px; }
    #girl { right: 30px; display: none; }

    #obstacle {
      position: absolute;
      bottom: 6px;
      right: -60px;
      font-size: 25px;
      animation: move linear infinite;
      animation-duration: 2s;
    }

    @keyframes move {
      from { right: -60px; }
      to { right: 100%; }
    }

    .jump { animation: jump 0.6s ease; }

    @keyframes jump {
      0% { bottom: 6px; }
      50% { bottom: 90px; }
      100% { bottom: 6px; }
    }

    #popup {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: white;
      padding: 20px 30px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      color: #ff4d6d;
      font-size: 18px;
      text-align: center;
      transition: 0.3s;
      z-index: 10;
    }

    #popup.show { transform: translate(-50%, -50%) scale(1); }

    #letter {
      position: absolute;
      bottom: 80px;
      right: 40px;
      font-size: 22px;
      opacity: 0;
      transition: 1s;
    }

    .giveLetter { animation: give 1s infinite alternate; }

    @keyframes give {
      from { transform: translateY(0); }
      to { transform: translateY(-10px); }
    }

    #end {
      display: none;
      margin-top: 20px;
      font-size: 22px;
      color: #ff4d6d;
    }

    .love {
      position: absolute;
      font-size: 20px;
      animation: explode 1s ease-out forwards;
    }

    @keyframes explode {
      0% { opacity: 1; transform: scale(0.5); }
      100% { opacity: 0; transform: scale(2) translateY(-80px); }
    }

  </style>
</head>

<body tabindex="0">

<h2>Run To You 💖</h2>
<h3 id="score">Score: 0</h3>

<div id="game">
  <div id="ground"></div>
  <img id="boy" src="zeeyz.png">
  <div id="obstacle">💔</div>
  <img id="girl" src="drell.png">

  <div id="popup"></div>
  <div id="letter">💌</div>
</div>

<div id="end">Yeay akhirnya kita ketemu 🥺💖</div>

<audio id="jumpSound" src="jump.mp3"></audio>

<script>
let boy = document.getElementById("boy");
let obstacle = document.getElementById("obstacle");
let girl = document.getElementById("girl");
let end = document.getElementById("end");
let popup = document.getElementById("popup");
let letter = document.getElementById("letter");
let scoreDisplay = document.getElementById("score");
let jumpSound = document.getElementById("jumpSound");
let bgm = document.getElementById("bgm");
let game = document.getElementById("game");

let score = 0;
let speed = 2;
let gameOver = false;

// JUMP

document.addEventListener("keydown", function(e){
  if(e.code === "Space" || e.key === " "){
    e.preventDefault();

    boy.classList.remove("jump");
    void boy.offsetWidth;
    boy.classList.add("jump");

    jumpSound.currentTime = 0;
    jumpSound.play();
  }
});

// SCORE
let scoreInterval = setInterval(() => {
  if(gameOver) return;
  score++;
  scoreDisplay.innerText = "Score: " + score;
}, 250);

// SPEED
let speedInterval = setInterval(() => {
  if(gameOver) return;
  speed -= 0.03;
  if(speed < 1.2) speed = 1.2;
  obstacle.style.animationDuration = speed + "s";
}, 3000);

// COLLISION
let check = setInterval(function(){
  if(gameOver) return;

  let boyBottom = parseInt(window.getComputedStyle(boy).getPropertyValue("bottom"));
  let obstacleLeft = obstacle.getBoundingClientRect().left;

  if(obstacleLeft < 100 && obstacleLeft > 50 && boyBottom < 25){
    gameOver = true;

    popup.innerHTML = "Yah ayang nabrak 😭<br>Score: " + score;
    popup.classList.add("show");

    setTimeout(() => {
      location.reload();
    }, 2000);
  }
},10);

// ENDING
setTimeout(()=>{
  gameOver = true; // ⬅️ stop score & speed

  obstacle.style.display = "none";
  girl.style.display = "block";

  // 1. boy jalan ke cewe
  boy.style.left = "60%";

  setTimeout(()=>{
    // 2. cewe animasi
    girl.classList.add("giveLetter");

    setTimeout(()=>{
      // 3. pelukan
      boy.src = "couple.png";
      boy.style.left = "65%";

      setTimeout(()=>{
        // 4. kasih surat
        letter.style.opacity = "1";

        setTimeout(()=>{
          // 5. love explosion
          explodeLove();

          setTimeout(()=>{
            // 6. zoom
            game.style.transform = "scale(1.3)";

            end.style.display = "block";

          },800);

        },1200);

      },800);

    },1500);

  },2000);

},15000);

function explodeLove() {
  for (let i = 0; i < 15; i++) {
    let love = document.createElement("div");
    love.className = "love";
    love.innerHTML = "💖";
    love.style.left = (window.innerWidth / 2 + (Math.random()*100 - 50)) + "px";
    love.style.top = (window.innerHeight / 2) + "px";
    document.body.appendChild(love);
    setTimeout(()=>love.remove(),1000);
  }
}
</script>

</body>
</html>
