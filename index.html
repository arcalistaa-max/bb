<!DOCTYPE html>
<html>
<head>
<title>Run To You 💖</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: linear-gradient(#ffe4ec, #ffd1dc);
  text-align: center;
  font-family: Arial;
}

h2 { color:#ff4d6d; }
#score { color:#ff4d6d; }

/* GAME AREA */
#game {
  width: 90%;
  height: 300px;
  margin: 30px auto;
  position: relative;
  overflow: hidden;
  border-radius: 20px;
  background: rgba(255,255,255,0.4);
}

/* GROUND */
#ground {
  position: absolute;
  bottom: 0;
  width: 200%;
  height: 6px;
  background: #ff8fab;
  animation: ground 2s linear infinite;
}

@keyframes ground {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

/* CHARACTER */
#boy {
  position: absolute;
  bottom: 6px;
  left: 50px;
  width: 60px;
  transition: 0.2s;
}

.jump {
  animation: jump 0.6s ease;
}

@keyframes jump {
  0% { bottom: 6px; }
  50% { bottom: 110px; }
  100% { bottom: 6px; }
}

/* OBSTACLE BAWAH */
.obstacle {
  position: absolute;
  bottom: 6px;
  right: -50px;
  font-size: 25px;
  animation: move 2s linear infinite;
}

/* BLOCK ATAS (MARIO STYLE) */
.block {
  position: absolute;
  bottom: 80px;
  right: -50px;
  width: 40px;
  height: 40px;
  background: #ff8fab;
  border-radius: 8px;
  animation: move 2.5s linear infinite;
}

/* LOVE */
.loveItem {
  position: absolute;
  bottom: 140px;
  right: -50px;
  font-size: 22px;
  animation: move 3s linear infinite;
}

@keyframes move {
  from { right: -50px; }
  to { right: 100%; }
}

/* POPUP */
#popup {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  background: white;
  padding: 20px;
  border-radius: 15px;
  color: #ff4d6d;
  transition: 0.3s;
}

#popup.show {
  transform: translate(-50%, -50%) scale(1);
}

</style>
</head>

<body>

<h2>Run To You 💖</h2>
<h3 id="score">Score: 0</h3>

<div id="game">
  <div id="ground"></div>

  <img id="boy" src="zeeyz.png">

  <div class="obstacle" id="obs1">💔</div>
  <div class="block" id="block1"></div>
  <div class="loveItem" id="love1">💖</div>

  <div id="popup"></div>
</div>

<script>

let boy = document.getElementById("boy");
let obs = document.getElementById("obs1");
let block = document.getElementById("block1");
let love = document.getElementById("love1");
let popup = document.getElementById("popup");
let scoreDisplay = document.getElementById("score");

let score = 0;
let gameOver = false;

/* JUMP */
function jump(){
  if(gameOver) return;

  boy.classList.remove("jump");
  void boy.offsetWidth;
  boy.classList.add("jump");
}

window.addEventListener("keydown", e=>{
  if(e.code === "Space"){
    e.preventDefault();
    jump();
  }
});

window.addEventListener("click", jump);
window.addEventListener("touchstart", jump);

/* SCORE */
setInterval(()=>{
  if(gameOver) return;
  score++;
  scoreDisplay.innerText = "Score: " + score;
},300);

/* RANDOM HEIGHT LOVE */
setInterval(()=>{
  let h = Math.random()*60 + 120;
  love.style.bottom = h+"px";
},3000);

/* COLLISION SYSTEM */
setInterval(()=>{
  if(gameOver) return;

  let boyRect = boy.getBoundingClientRect();

  let obsRect = obs.getBoundingClientRect();
  let blockRect = block.getBoundingClientRect();
  let loveRect = love.getBoundingClientRect();

  let pad = 15;

  // 💔 obstacle bawah
  if(
    boyRect.right - pad > obsRect.left &&
    boyRect.left + pad < obsRect.right &&
    boyRect.bottom - pad > obsRect.top
  ){
    endGame();
  }

  // 🧱 block atas (kepala kena)
  if(
    boyRect.right - pad > blockRect.left &&
    boyRect.left + pad < blockRect.right &&
    boyRect.top + pad < blockRect.bottom &&
    boyRect.bottom > blockRect.top
  ){
    endGame();
  }

  // 💖 ambil love
  if(
    boyRect.right > loveRect.left &&
    boyRect.left < loveRect.right &&
    boyRect.top < loveRect.bottom
  ){
    score += 10;
    scoreDisplay.innerText = "Score: " + score;

    love.style.right = "-50px";
  }

},10);

/* GAME OVER */
function endGame(){
  gameOver = true;
  popup.innerHTML = "Yah ayang nabrak 😭<br>Score: "+score;
  popup.classList.add("show");

  setTimeout(()=>location.reload(),2000);
}

</script>

</body>
</html>
