<!DOCTYPE html>
<html>
<head>
  <title>Run To You 💖</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: linear-gradient(#ffe4ec, #ffd1dc);
      font-family: Arial;
      text-align: center;
    }

    h2 {
      margin-top: 20px;
      color: #ff4d6d;
    }

    #game {
      width: 100%;
      height: 300px;
      position: relative;
      overflow: hidden;
      margin-top: 50px;
    }

    /GROUND/
    #ground {
      position: absolute;
      bottom: 0;
      width: 200%;
      height: 6px;
      background: #ff8fab;
      animation: groundMove 2s linear infinite;
    }

    @keyframes groundMove {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }

    /KARAKTER/
    #boy, #girl {
      position: absolute;
      bottom: 6px;
      width: 50px;
    }

    #boy {
      left: 50px;
    }

    #girl {
      right: 30px;
      display: none;
    }

   #obstacle {
  position: absolute;
  bottom: 6px;
  right: -60px;
  font-size: 25px;
  animation: move linear infinite;
  animation-duration: 2s;
}
    @keyframes move {
      from { right: -60px; }
      to { right: 100%; }
    }
/LOVE EXPLOSION/
.love {
  position: absolute;
  font-size: 20px;
  animation: explode 1s ease-out forwards;
}

@keyframes explode {
  0% {
    opacity: 1;
    transform: scale(0.5);
  }
  100% {
    opacity: 0;
    transform: scale(2) translateY(-80px);
  }
}

/SPARKLE/
.sparkle {
  position: absolute;
  font-size: 14px;
  animation: sparkleAnim 1.5s ease-out forwards;
}

@keyframes sparkleAnim {
  0% {
    opacity: 1;
    transform: scale(0.5);
  }
  100% {
    opacity: 0;
    transform: scale(1.5) translateY(-60px);
  }
}

    /JUMP/
    .jump {
      animation: jump 0.6s ease;
    }

    @keyframes jump {
      0% { bottom: 6px; }
      50% { bottom: 120px; }
      100% { bottom: 6px; }
    }

    /END TEXT/
    #end {
      display: none;
      margin-top: 30px;
      font-size: 24px;
      color: #ff4d6d;
      animation: fadeIn 2s forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

  </style>
</head>

<body tabindex="0">

<h2>tekan SPASI buat lompat 🥺</h2>
<div id="game">
  <div id="ground"></div>

  <!-- KARAKTER -->
  <img id="boy" src="zeeyz.png">
  <div id="obstacle"> 💔 </div>
  <img id="girl" src="drell.png">
</div>

<div id="end">akhirnya aku sampai ke kamu 🥺💖</div>

<script>
  document.body.focus();
let boy = document.getElementById("boy");
let obstacle = document.getElementById("obstacle");
let girl = document.getElementById("girl");
let end = document.getElementById("end");

/LOMPAT/
document.addEventListener("keydown", function(e){
  if(e.code === "Space" || e.key === " "){
    e.preventDefault();

    boy.classList.remove("jump");
    void boy.offsetWidth; // 
    boy.classList.add("jump");
  }
});

  let score = 0;
let speed = 2;
let gameOver = false;

let scoreDisplay = document.getElementById("score");
let jumpSound = document.getElementById("jumpSound");

// SCORE
setInterval(() => {
  if(gameOver) return;
  score++;
  scoreDisplay.innerText = "Score: " + score;
}, 100);

// SPEED NAIK
setInterval(() => {
  if(gameOver) return;
  speed -= 0.1;
  if(speed < 0.8) speed = 0.8;
  obstacle.style.animationDuration = speed + "s";
}, 2000);

// LOMPAT
document.addEventListener("keydown", function(e){
  if(e.code === "Space" || e.key === " "){
    e.preventDefault();

    boy.classList.remove("jump");
    void boy.offsetWidth;
    boy.classList.add("jump");

  }
});

// COLLISION
let check = setInterval(function(){
  if(gameOver) return;

  let boyBottom = parseInt(window.getComputedStyle(boy).getPropertyValue("bottom"));
  let obstacleLeft = obstacle.getBoundingClientRect().left;

  if(obstacleLeft < 120 && obstacleLeft > 60 && boyBottom < 20){
    gameOver = true;
    alert("yah ketabrak 😭 Score kamu: " + score);
    location.reload();
  }
},10);

  let score = 0;
let scoreDisplay = document.getElementById("score"); //
setInterval(() => {
  score++;
  scoreDisplay.innerText = "Score: " + score;
}, 100);

  let speed = 2;

setInterval(() => {
  speed -= 0.1; // 
  if(speed < 0.8) speed = 0.8; // 

  obstacle.style.animationDuration = speed + "s";
}, 2000);
  
let gameOver = false;

let check = setInterval(function(){
  if(gameOver) return;

  let boyBottom = parseInt(window.getComputedStyle(boy).getPropertyValue("bottom"));
  let obstacleLeft = obstacle.getBoundingClientRect().left;

  if(obstacleLeft < 120 && obstacleLeft > 60 && boyBottom < 20){
    gameOver = true;
    alert("yah ketabrak 😭 Score kamu: " + score);
    location.reload();
  }
},10);
/ENDING/
setTimeout(()=>{
  obstacle.style.display = "none";
  girl.style.display = "block";

  /jalan ke cewe/
  boy.style.transition = "2s";
  boy.style.left = "65%";

  setTimeout(()=>{
    /pelukan/
    boy.style.opacity = "0";
    girl.style.opacity = "0";

    setTimeout(()=>{
      boy.src = "couple.png";
      boy.style.left = "68%";
      boy.style.opacity = "1";
      girl.style.display = "none";

      explodeLove();

      end.style.display = "block";
    },500);

  },2000);

},15000);

/LOVE EXPLOSION FUNCTION /
function explodeLove() {
  for (let i = 0; i < 15; i++) {
    let love = document.createElement("div");
    love.className = "love";
    love.innerHTML = "💖";
    love.style.left = (window.innerWidth / 2 + (Math.random()*100 - 50)) + "px";
    love.style.top = (window.innerHeight / 2) + "px";
    document.body.appendChild(love);

    setTimeout(()=>love.remove(),1000);
  }

  for (let i = 0; i < 10; i++) {
    let sparkle = document.createElement("div");
    sparkle.className = "sparkle";
    sparkle.innerHTML = "✨";
    sparkle.style.left = (window.innerWidth / 2 + (Math.random()*120 - 60)) + "px";
    sparkle.style.top = (window.innerHeight / 2) + "px";
    document.body.appendChild(sparkle);

    setTimeout(()=>sparkle.remove(),1500);
  }
}
