<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Run To You 💖</title>
<style>
body {
  margin:0;
  overflow:hidden;
  font-family:Arial;
  background: linear-gradient(#ffe4ec,#ffd1dc);
  text-align:center;
}

h2, #score { color:#ff4d6d; }

#game {
  width:90%;
  height:320px;
  margin:20px auto;
  position:relative;
  overflow:hidden;
  border-radius:20px;
  background: linear-gradient(#fff0f5,#ffd6e0);
}

#ground {
  position:absolute;
  bottom:0;
  width:200%;
  height:6px;
  background:#ff8fab;
  animation: ground 2s linear infinite;
}

@keyframes ground {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

#boy {
  position:absolute;
  bottom:6px;
  left:50px;
  width:60px;
}

#girl {
  position:absolute;
  bottom:6px;
  right:50px;
  width:80px;
  display:none;
}
  
#boy.duck {
  height:35px;
  width:60px;
}

.flyingObstacle {
  position:absolute;
  bottom:80px;
  font-size:26px;
}
.jump { animation: jump 0.45s ease; }
@keyframes jump {
  0% { bottom:6px; }
  50% { bottom:140px; }
  100% { bottom:6px; }
}

.obstacle, .loveItem {
  position:absolute;
  right:-50px;
  font-size:26px;
}

.obstacle { bottom:6px; }
.loveItem { bottom:140px; }

#popup {
  position:absolute;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:white;
  padding:20px;
  border-radius:15px;
  color:#ff4d6d;
  transition:0.3s;
}

#popup.show { transform:translate(-50%,-50%) scale(1); }

button {
  margin-top:10px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#ff4d6d;
  color:white;
  cursor:pointer;
}

#startScreen {
  position:fixed;
  width:100%;
  height:100%;
  background:#ffe4ec;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:10;
}
</style>
</head>

<body>

<div id="startScreen">
  <h2>Run To You 💖</h2>
  <p>Tekan spasi / klik untuk lompat ya sayangku</p>
  <button onclick="startGame()">Mulai 💖</button>
</div>

<h2>Run To You 💖</h2>
<h3 id="score">Score: 0</h3>

<div id="game">
  <div id="ground"></div>
  <img id="boy" src="zeeyz.png">
  <img id="girl" src="drell.png">
  <div id="popup"></div>
</div>

<!-- SOUND -->
<audio id="jumpSound" src="jump.mp3"></audio>
<audio id="hitSound" src="hit.mp3"></audio>
<audio id="winSound" src="win.mp3"></audio>
<audio id="bgm" src="bgm.mp3" loop></audio>
<audio id="letterBgm" src="love.mp3" loop></audio>
  
<script>
let boy = document.getElementById("boy");
let girl = document.getElementById("girl");
let popup = document.getElementById("popup");
let scoreDisplay = document.getElementById("score");

let jumpSound = document.getElementById("jumpSound");
let hitSound = document.getElementById("hitSound");
let winSound = document.getElementById("winSound");
let bgm = document.getElementById("bgm");
let letterBgm = document.getElementById("letterBgm");
  
let score = 0;
let gameOver = false;
let obstacles = [];

function startGame(){
  document.getElementById("startScreen").style.display="none";

  bgm.volume = 0.3;

  bgm.play().catch(()=> {
    console.log("Autoplay diblok, klik layar dulu");
  });

  spawnObstacle();
}
function duckDown(){
  if(gameOver) return;
  boy.classList.add("duck");
}

function duckUp(){
  boy.classList.remove("duck");
}
function jump(){
  if(gameOver) return;
  jumpSound.play();
  boy.classList.remove("jump");
  void boy.offsetWidth;
  boy.classList.add("jump");
}

document.addEventListener("click", jump);
document.addEventListener("keydown", e=>{
  if(e.code === "Space") jump();
});
  
document.addEventListener("keydown", e=>{
  if(e.code === "ArrowDown") duckDown();
});

document.addEventListener("keyup", e=>{
  if(e.code === "ArrowDown") duckUp();
});
  
setInterval(()=>{
  if(gameOver) return;
  score++;
  scoreDisplay.innerText = "Score: "+score;
  if(score>=200) winGame();
},100);

function spawnObstacle(){
  if(gameOver) return;
  let el = document.createElement("div");
  let type = Math.random();

  if(type < 0.5){
  el.className="obstacle";
  el.innerHTML="💔";
} else if(type < 0.8){
  el.className="flyingObstacle";
  el.innerHTML="🕊️";
} else {
  el.className="loveItem";
  el.innerHTML="💖";
}

  el.style.right="-50px";
  document.getElementById("game").appendChild(el);
  obstacles.push(el);

  setTimeout(spawnObstacle, Math.random()*800+500);
}

let speed = 6;
setInterval(()=>{
  if(gameOver) return;

  for(let i=obstacles.length-1;i>=0;i--){
    let el = obstacles[i];
    el.style.right = (parseInt(el.style.right)+speed)+"px";

    let boyRect = boy.getBoundingClientRect();
    let rect = el.getBoundingClientRect();

    if(el.className==="obstacle"){
  let padding = 15; // makin besar = makin gampang lolos

  if(
    boyRect.right - padding > rect.left &&
    boyRect.left + padding < rect.right &&
    boyRect.bottom - padding > rect.top
  ){
    hitSound.play();
    endGame();
  }
}
if(el.className==="flyingObstacle"){
  let padding = 10;

  if(
    boyRect.right - padding > rect.left &&
    boyRect.left + padding < rect.right &&
    boyRect.top < rect.bottom - padding
  ){
    hitSound.play();
    endGame();
  }
}
   if(el.className==="loveItem"){
  if(
    boyRect.right > rect.left &&
    boyRect.left < rect.right &&
    boyRect.top < rect.bottom
  ){
        score+=10;
        el.remove();
        obstacles.splice(i,1);
      }
    }

    if(rect.right<0){
      el.remove();
      obstacles.splice(i,1);
    }
  }
},20);

function winGame(){
  gameOver = true;
  winSound.play();
  girl.style.display="block";

  popup.innerHTML = `
    <h3>💖 akhirnya kita ketemu...</h3>
    <button onclick="showLetter()">💌 Buka Surat</button><br>
    <button onclick="location.reload()">🎮 Main Lagi</button>
  `;
  popup.classList.add("show");
}

function endGame(){
  gameOver=true;
  popup.innerHTML = "HUUU CUPUUU!<br>Score: "+score;
  popup.classList.add("show");

  setTimeout(()=>location.reload(),2000);
}
function showLetter(){

  // stop lagu game
  bgm.pause();
  bgm.currentTime = 0;

  // reset & play lagu surat
  letterBgm.currentTime = 0;
  letterBgm.volume = 0.4;

  let playPromise = letterBgm.play();

  if(playPromise !== undefined){
    playPromise.catch(()=>{
      console.log("Audio butuh interaksi lagi");
    });
  }

  document.body.innerHTML = `
  
  <div style="
    min-height:100vh;
    background:linear-gradient(#ffe4ec,#ffd1dc);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    color:#ff4d6d;
  ">

    <div id="slides" style="
      width:90%;
      max-width:420px;
      background:white;
      padding:20px;
      border-radius:20px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
    "></div>

  </div>
  `;

  let slides = [
    {
      text:`sayangku cintaku gantengku...<br><br>
      maafin aku yang pas awal sering bikin kamu sakit hati ya<br>
      terimakasih kamu udah berjuang buat hubungan kita💖`,
      img:"a.JPG"
    },
    {
      text:`terimakasih kamu selalu menomorsatukan diri aku yang ga seberapa ini <br>
      jujur, sampai sekarang pun aku masi ngerasa kamu terlalu baik buat aku hehe<br><br>
      terus temenin aku sampai aku berani untuk berdiri tegak di sebelah kamu ya sayang,
      img:"b.JPG"
    },
    {
      text:`kadang aku nyebelin, kadang kamu juga 😭<br><br>
      tapi anehnya... aku tetap milih kamu`,
      img:"c.JPG"
    },
    {
      text:`kalau nanti jalannya makin susah,<br>
      jangan pergi ya...<br><br>
      kita lewatin bareng-bareng ✨`,
      img:"https://i.imgur.com/4.jpg"
    },
    {
      text:`dan kalau di akhir semuanya kita masih bareng...<br><br>
      berarti kamu emang tujuan aku 💖`,
      img:"https://i.imgur.com/5.jpg"
    }
  ];

  let index = 0;

  function renderSlide(){
    let s = slides[index];
    document.getElementById("slides").innerHTML = `
      <h3>💌 Untuk Kamu</h3>
      <p>${s.text}</p>
      <img src="${s.img}" style="width:100%;border-radius:12px;margin-top:10px;">
      <br><br>
      ${
        index < slides.length-1
        ? `<button onclick="nextSlide()">Lanjut ➡️</button>`
        : `<button onclick="location.reload()">💖 Main Lagi</button>`
      }
    `;
  }

  window.nextSlide = function(){
    index++;
    renderSlide();
  }

  renderSlide();
}
</script>

</body>
</html>
